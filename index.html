<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Theatre Booking</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-pink-500 to-orange-400">
<div class="w-full max-w-lg bg-white/90 backdrop-blur p-6 rounded-2xl shadow-xl">
<h1 class="text-2xl font-bold mb-4 text-center"> Theatre Booking</h1>

<!-- SELECT SHOW -->
<select id="show" class="w-full p-2 border rounded mb-3">
<option value="">Select a show</option>
<option>Hamlet</option>
<option>The Lion King</option>
<option>Phantom of the Opera</option>
</select>

<!-- SELECT TIME -->
<select id="time" class="w-full p-2 border rounded mb-3">
<option value="">Select time</option>
<option>18:00</option>
<option>20:00</option>
<option>22:00</option>
</select>

<!-- SEATS -->
<div class="grid grid-cols-5 gap-2 mb-4" id="seats"></div>

<!-- BOOK BUTTON -->
<button id="bookBtn" class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600">
Book Seat
</button>

<!-- BOOKINGS -->
<h2 class="mt-6 font-bold"> My Bookings</h2>
<ul id="bookingList" class="mt-2"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDeanKcppyEQVFiYEPLe68FvN4ozn38-A0",
authDomain: "theatre-booking-system-d45a7.firebaseapp.com",
projectId: "theatre-booking-system-d45a7",
storageBucket: "theatre-booking-system-d45a7.firebasestorage.app",
messagingSenderId: "66972534681",
appId: "1:66972534681:web:1995cb45236fc107ee3508",
measurementId: "G-57HNT4357H"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const seatsContainer = document.getElementById("seats");
const bookingList = document.getElementById("bookingList");

let selectedSeat = null;

for (let i = 1; i <= 15; i++) {
const seat = document.createElement("div");
seat.textContent = i;
seat.className = "p-2 bg-gray-200 text-center rounded cursor-pointer";

seat.onclick = () => {
document.querySelectorAll("#seats div").forEach(s =>
s.classList.remove("bg-green-400")
);
seat.classList.add("bg-green-400");
selectedSeat = i;
};

seatsContainer.appendChild(seat);
}

async function loadBookings() {
bookingList.innerHTML = "";

const querySnapshot = await getDocs(collection(db, "bookings"));

querySnapshot.forEach((bookingDoc) => {
const b = bookingDoc.data();
const li = document.createElement("li");
li.className = "flex justify-between border-b p-2";

li.innerHTML = `
<span> ${b.show} - ${b.time} - ${b.seat}</span>
<button class="text-red-500 font-bold"></button>
`;

li.querySelector("button").onclick = async () => {
await deleteDoc(doc(db, "bookings", bookingDoc.id));
loadBookings();
};

bookingList.appendChild(li);
});
}

document.getElementById("bookBtn").onclick = async () => {
const show = document.getElementById("show").value;
const time = document.getElementById("time").value;

if (!show || !time || !selectedSeat) {
alert("Please select show, time and seat");
return;
}

await addDoc(collection(db, "bookings"), {
show,
time,
seat: selectedSeat
});

selectedSeat = null;
document.querySelectorAll("#seats div").forEach(s =>
s.classList.remove("bg-green-400")
);

loadBookings();
};

loadBookings();
console.log("Firestore Database connected successfully!");
</script>
</body>
</html>
