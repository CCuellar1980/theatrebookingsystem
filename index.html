<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Theatre Booking</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-purple-600 via-pink-500 to-orange-400 flex items-center justify-center p-4">

<div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-8">

  <h1 class="text-3xl font-extrabold text-center mb-2">🎭 Theatre Booking</h1>
  <p class="text-center text-gray-500 mb-6">
    Select your show, time, and seats
  </p>

  <!-- FORM -->
  <div class="grid md:grid-cols-2 gap-4 mb-6">

    <div>
      <label class="text-sm font-semibold text-gray-600">Show</label>
      <select id="show" class="w-full p-3 border rounded-xl">
        <option value="">Choose a show</option>
        <option>Hamlet</option>
        <option>The Lion King</option>
        <option>Phantom of the Opera</option>
      </select>
    </div>

    <div>
      <label class="text-sm font-semibold text-gray-600">Time</label>
      <select id="time" class="w-full p-3 border rounded-xl">
        <option value="">Choose time</option>
        <option>18:00</option>
        <option>20:00</option>
        <option>22:00</option>
      </select>
    </div>

  </div>

  <!-- SEATS -->
  <h2 class="font-bold mb-2">Choose Seats</h2>
  <div id="seats" class="grid grid-cols-5 gap-3 mb-4"></div>
  <p class="text-sm text-gray-500 mb-4">You can select multiple seats</p>

  <!-- BUTTON -->
  <button id="bookBtn"
    class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold hover:bg-purple-700">
    🎟️ Book Now
  </button>

  <!-- MESSAGE -->
  <div id="message" class="text-center mt-4 font-bold"></div>

  <!-- BOOKINGS -->
  <div class="mt-8">
    <h2 class="text-xl font-bold mb-3">📋 My Bookings</h2>
    <ul id="bookingList" class="space-y-2"></ul>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 YOUR REAL CONFIG (keep this)
const firebaseConfig = {
  apiKey: "AIzaSyDeanKcppyEQVFiYEPLe68FvN4ozn38-A0",
  authDomain: "theatre-booking-system-d45a7.firebaseapp.com",
  projectId: "theatre-booking-system-d45a7",
  storageBucket: "theatre-booking-system-d45a7.appspot.com",
  messagingSenderId: "66972534681",
  appId: "1:66972534681:web:1995cb45236fc107ee3508"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const seatsContainer = document.getElementById("seats");
const bookingList = document.getElementById("bookingList");
const messageBox = document.getElementById("message");

let selectedSeats = [];

// 🎟️ CREATE SEATS
for (let i = 1; i <= 15; i++) {
  const seat = document.createElement("div");
  seat.textContent = i;

  seat.className =
    "p-3 text-center rounded-xl cursor-pointer bg-gray-200 hover:bg-gray-300 font-bold";

  seat.onclick = () => {
    if (selectedSeats.includes(i)) {
      selectedSeats = selectedSeats.filter(s => s !== i);
      seat.classList.remove("bg-green-500", "text-white");
    } else {
      selectedSeats.push(i);
      seat.classList.add("bg-green-500", "text-white");
    }
  };

  seatsContainer.appendChild(seat);
}

// 📢 MESSAGE
function showMessage(text, color) {
  messageBox.textContent = text;
  messageBox.className = `text-${color}-600 text-center mt-4 font-bold`;
}

// 🚫 CHECK DUPLICATE
async function isAnySeatBooked(show, time, seats) {
  for (let seat of seats) {
    const q = query(
      collection(db, "bookings"),
      where("show", "==", show),
      where("time", "==", time),
      where("seat", "==", seat)
    );

    const snapshot = await getDocs(q);
    if (!snapshot.empty) return true;
  }
  return false;
}

// 📥 LOAD BOOKINGS
async function loadBookings() {
  bookingList.innerHTML = "";

  const snapshot = await getDocs(collection(db, "bookings"));

  snapshot.forEach((docSnap) => {
    const b = docSnap.data();

    const li = document.createElement("li");
    li.className =
      "flex justify-between items-center bg-gray-100 p-3 rounded-xl";

    li.innerHTML = `
      <span>${b.show} | ${b.time} | Seat ${b.seat}</span>
      <button class="text-red-500 font-bold hover:text-red-700">Delete</button>
    `;

    li.querySelector("button").onclick = async () => {
      await deleteDoc(doc(db, "bookings", docSnap.id));
      showMessage("Booking deleted", "red");
      loadBookings();
    };

    bookingList.appendChild(li);
  });
}

// 🎯 BOOK
document.getElementById("bookBtn").onclick = async () => {
  const show = document.getElementById("show").value;
  const time = document.getElementById("time").value;

  if (!show || !time || selectedSeats.length === 0) {
    showMessage("⚠️ Complete all fields", "red");
    return;
  }

  const taken = await isAnySeatBooked(show, time, selectedSeats);

  if (taken) {
    showMessage("❌ One or more seats already booked", "red");
    return;
  }

  for (let seat of selectedSeats) {
    await addDoc(collection(db, "bookings"), {
      show,
      time,
      seat
    });
  }

  showMessage("✅ Booking successful!", "green");

  selectedSeats = [];
  document.querySelectorAll("#seats div").forEach(s =>
    s.classList.remove("bg-green-500", "text-white")
  );

  loadBookings();
};

loadBookings();
</script>

</body>
</html>
