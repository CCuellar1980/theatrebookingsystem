<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>School Agenda App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-white p-6 rounded-xl shadow">
  <h2 class="text-xl font-bold mb-4">📚 My Tasks</h2>

  <!-- INPUT -->
  <div class="flex mb-4">
    <input id="taskInput" placeholder="New task..." class="flex-1 p-2 border rounded-l">
    <button id="addTaskBtn" class="bg-green-500 text-white px-4 rounded-r">Add</button>
  </div>

  <!-- LIST -->
  <ul id="taskList"></ul>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  const taskList = document.getElementById("taskList");

  // ➕ ADD TASK
  document.getElementById("addTaskBtn").onclick = () => {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();

    if (!text) return;

    tasks.push({ text: text, done: false });
    localStorage.setItem("tasks", JSON.stringify(tasks));

    input.value = "";
    renderTasks();
  };

  // 📥 RENDER TASKS
  function renderTasks() {
    taskList.innerHTML = "";

    tasks.forEach((task, index) => {
      const li = document.createElement("li");
      li.className = "flex justify-between items-center p-2 border-b";

      const span = document.createElement("span");
      span.textContent = task.text;
      if (task.done) span.classList.add("line-through");

      // toggle
      span.onclick = () => {
        tasks[index].done = !tasks[index].done;
        localStorage.setItem("tasks", JSON.stringify(tasks));
        renderTasks();
      };

      // delete
      const delBtn = document.createElement("button");
      delBtn.textContent = "❌";
      delBtn.onclick = () => {
        tasks.splice(index, 1);
        localStorage.setItem("tasks", JSON.stringify(tasks));
        renderTasks();
      };

      li.appendChild(span);
      li.appendChild(delBtn);
      taskList.appendChild(li);
    });
  }

  // INIT
  renderTasks();
</script>

</body>
</html>
