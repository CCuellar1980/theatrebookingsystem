<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDeanKcppyEQVFiYEPLe68FvN4ozn38-A0",
  authDomain: "theatre-booking-system-d45a7.firebaseapp.com",
  projectId: "theatre-booking-system-d45a7",
  storageBucket: "theatre-booking-system-d45a7.appspot.com",
  messagingSenderId: "66972534681",
  appId: "1:66972534681:web:1995cb45236fc107ee3508"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const seatsContainer = document.getElementById("seats");
const bookingList = document.getElementById("bookingList");

let selectedSeat = null;

// 🎟️ CREATE SEATS
for (let i = 1; i <= 15; i++) {
  const seat = document.createElement("div");
  seat.textContent = i;
  seat.className = "p-2 bg-gray-200 text-center rounded cursor-pointer hover:bg-gray-300 transition";

  seat.onclick = () => {
    document.querySelectorAll("#seats div").forEach(s =>
      s.classList.remove("bg-green-400")
    );
    seat.classList.add("bg-green-400");
    selectedSeat = i;
  };

  seatsContainer.appendChild(seat);
}

// 📥 LOAD BOOKINGS
async function loadBookings() {
  bookingList.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "bookings"));

  querySnapshot.forEach((bookingDoc) => {
    const b = bookingDoc.data();

    const li = document.createElement("li");
    li.className = "flex justify-between items-center border-b p-2";

    li.innerHTML = `
      <span class="text-sm">${b.show} - ${b.time} - Seat ${b.seat}</span>
      <button class="text-red-500 font-bold hover:text-red-700">Delete</button>
    `;

    li.querySelector("button").onclick = async () => {
      try {
        await deleteDoc(doc(db, "bookings", bookingDoc.id));
        showMessage("Booking deleted ❌", "red");
        loadBookings();
      } catch (error) {
        console.error(error);
        showMessage("Error deleting booking", "red");
      }
    };

    bookingList.appendChild(li);
  });
}

// 🚫 CHECK DOUBLE BOOKING
async function isSeatBooked(show, time, seat) {
  const q = query(
    collection(db, "bookings"),
    where("show", "==", show),
    where("time", "==", time),
    where("seat", "==", seat)
  );

  const snapshot = await getDocs(q);
  return !snapshot.empty;
}

// 📢 MESSAGE UI
function showMessage(text, color) {
  const msg = document.createElement("div");
  msg.textContent = text;
  msg.className = `mt-3 text-center text-${color}-600 font-semibold`;

  document.querySelector(".max-w-lg").appendChild(msg);

  setTimeout(() => msg.remove(), 2500);
}

// 🎯 BOOK BUTTON
document.getElementById("bookBtn").onclick = async () => {
  const show = document.getElementById("show").value;
  const time = document.getElementById("time").value;

  if (!show || !time || !selectedSeat) {
    showMessage("Please select show, time, and seat", "red");
    return;
  }

  try {
    const alreadyBooked = await isSeatBooked(show, time, selectedSeat);

    if (alreadyBooked) {
      showMessage("Seat already booked ❌", "red");
      return;
    }

    await addDoc(collection(db, "bookings"), {
      show,
      time,
      seat: selectedSeat
    });

    showMessage("Booking successful 🎉", "green");

    selectedSeat = null;
    document.querySelectorAll("#seats div").forEach(s =>
      s.classList.remove("bg-green-400")
    );

    loadBookings();
  } catch (error) {
    console.error(error);
    showMessage("Error saving booking", "red");
  }
};

loadBookings();
console.log("Firestore connected ✅");
</script>
